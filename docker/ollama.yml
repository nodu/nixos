# Open WebUI - ChatGPT-like interface for Ollama
# Connects to Ollama running on the host (installed via Homebrew cask on macOS,
# or services.ollama on NixOS).
#
# Usage:
#   docker compose -f docker/ollama.yml up -d    # start
#   docker compose -f docker/ollama.yml down      # stop
#   docker compose -f docker/ollama.yml pull      # update image
#
# Open http://localhost:8080 in your browser.

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - WEBUI_AUTH=false
      - RAG_EMBEDDING_ENGINE=ollama
      - RAG_EMBEDDING_MODEL_AUTO_UPDATE=false
    volumes:
      - open-webui:/app/backend/data
    restart: unless-stopped

volumes:
  open-webui:
